
    <div class="fixed inset-0 z-50 overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
      <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
        <div class="fixed inset-0 bg-gray-500/75 transition-opacity" aria-hidden="true" (click)="state.closeCodeGenerator()"></div>
        <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
        <div class="relative inline-block align-bottom bg-white rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-5xl w-full">
          <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
            <div class="sm:flex sm:items-start">
              <div class="mt-3 text-center sm:mt-0 sm:text-left w-full">
                <div class="flex justify-between items-center mb-4">
                  <h3 class="text-lg leading-6 font-medium text-gray-900" id="modal-title">
                    Code Generator
                  </h3>
                  <div class="flex gap-2">
                    @if (!errorState()) {
                      <button (click)="downloadCode()" class="inline-flex items-center px-3 py-1.5 border border-gray-300 text-xs font-medium rounded-md shadow-sm text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                        </svg>
                        Download
                      </button>
                      <button (click)="copyCode()" class="inline-flex items-center px-3 py-1.5 border border-transparent text-xs font-medium rounded-md shadow-sm text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                        </svg>
                        {{ copied() ? 'Copied!' : 'Copy Code' }}
                      </button>
                    }
                  </div>
                </div>

                <div class="border-b border-gray-200 mb-4">
                  <nav class="-mb-px flex space-x-8" aria-label="Tabs">
                    <button (click)="setActiveTab('R')" [class.border-indigo-500]="activeTab() === 'R'" [class.text-indigo-600]="activeTab() === 'R'" [class.border-transparent]="activeTab() !== 'R'" [class.text-gray-500]="activeTab() !== 'R'" class="whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm hover:text-gray-700 hover:border-gray-300">
                      R
                    </button>
                    <button (click)="setActiveTab('SAS')" [class.border-indigo-500]="activeTab() === 'SAS'" [class.text-indigo-600]="activeTab() === 'SAS'" [class.border-transparent]="activeTab() !== 'SAS'" [class.text-gray-500]="activeTab() !== 'SAS'" class="whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm hover:text-gray-700 hover:border-gray-300">
                      SAS
                    </button>
                    <button (click)="setActiveTab('Python')" [class.border-indigo-500]="activeTab() === 'Python'" [class.text-indigo-600]="activeTab() === 'Python'" [class.border-transparent]="activeTab() !== 'Python'" [class.text-gray-500]="activeTab() !== 'Python'" class="whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm hover:text-gray-700 hover:border-gray-300">
                      Python
                    </button>
                  </nav>
                </div>

                @if (errorState()) {
                  <div class="bg-red-50 border-l-4 border-red-500 p-4 rounded-md">
                    <div class="flex items-start justify-between">
                      <div class="flex-1">
                        <p class="text-sm font-semibold text-red-800">{{ errorState()!.name }}</p>
                        <p class="mt-1 text-sm text-red-700">{{ errorState()!.message }}</p>
                        @if (errorState()!.context) {
                          <details class="mt-3">
                            <summary class="cursor-pointer text-xs font-medium text-red-600 hover:text-red-800 select-none">
                              Technical Payload (click to expand)
                            </summary>
                            <pre class="mt-2 text-xs text-red-700 bg-red-100 rounded p-3 overflow-x-auto whitespace-pre-wrap break-all">{{ errorState()!.context | json }}</pre>
                          </details>
                        }
                      </div>
                      <button
                        (click)="copyErrorLog()"
                        title="Copy error log to clipboard"
                        class="ml-4 flex-shrink-0 inline-flex items-center px-2.5 py-1.5 border border-red-300 text-xs font-medium rounded text-red-700 bg-white hover:bg-red-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                        </svg>
                        Copy Error Log
                      </button>
                    </div>
                  </div>
                } @else {
                  <div class="bg-gray-900 rounded-md p-4 overflow-x-auto max-h-[60vh] overflow-y-auto">
                    <pre data-testid="generated-code" class="text-gray-100 text-sm font-mono"><code>{{ currentCode }}</code></pre>
                  </div>
                }
              </div>
            </div>
          </div>
          <div class="bg-gray-50 px-4 py-3 sm:px-6 sm:flex sm:flex-row-reverse">
            <button type="button" class="mt-3 w-full inline-flex justify-center rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 sm:mt-0 sm:w-auto sm:text-sm" (click)="state.closeCodeGenerator()">
              Close
            </button>
          </div>
        </div>
      </div>
    </div>
