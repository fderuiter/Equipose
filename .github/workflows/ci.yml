name: CI Workflow

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Build Project
      run: npm run build

    - name: Run Unit Tests
      run: npm test -- --watch=false

  e2e:
    runs-on: ubuntu-latest
    needs: build_and_test
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3, 4]
        shardTotal: [4]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium

    - name: Run E2E Tests (Shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }})
      run: |
        npm run start &
        for i in {1..60}; do
          if curl --silent --fail http://localhost:4200 > /dev/null; then
            break
          fi
          if [ "$i" -eq 60 ]; then
            echo "Timed out waiting for http://localhost:4200"
            exit 1
          fi
          sleep 2
        done
        npx playwright test --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
      env:
        CI: true

    - name: Upload blob report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: blob-report-${{ matrix.shardIndex }}
        path: blob-report/
        retention-days: 1

  merge_reports:
    runs-on: ubuntu-latest
    needs: e2e
    if: always()
    permissions:
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Download all blob reports
      uses: actions/download-artifact@v8
      with:
        path: all-blob-reports
        pattern: blob-report-*
        merge-multiple: true

    - name: Merge Playwright reports
      run: npx playwright merge-reports --reporter html ./all-blob-reports

    - name: Upload merged HTML report
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

  security_scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Check for insecure Math.random() in randomization domain
      run: |
        echo "Scanning for Math.random() usage in randomization-engine..."
        if grep -rn "Math\.random()" src/app/domain/randomization-engine/; then
          echo "ERROR: Math.random() detected in randomization-engine domain."
          echo "Use seedrandom or the Web Crypto API (crypto.getRandomValues) instead."
          exit 1
        fi
        echo "No insecure Math.random() found in randomization domain."
