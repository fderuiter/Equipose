name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write
  pull-requests: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: https://equipose.org # Hardcoded to your new custom domain
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

      - name: Build Angular Project
        # CRITICAL UPDATE: Base href is now the root directory for the custom domain
        run: npm run build -- --base-href /

      - name: Fix Angular Routing (Create 404.html)
        run: cp dist/app/browser/index.html dist/app/browser/404.html

      - name: Inject CNAME File
        # This is the exact fix for your InvalidDNSError.
        # It forces the domain configuration into the final deployment package.
        run: echo "equipose.org" > dist/app/browser/CNAME

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: './dist/app/browser'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
